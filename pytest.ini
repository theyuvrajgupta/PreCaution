[pytest]
# Put the repo root on sys.path so `import app` works under a bare `pytest`
# invocation (the console script doesn't add the CWD the way `python -m pytest`
# does) — needed for CI and for the README's documented `pytest` command.
pythonpath = .
markers =
    costly: hits the real Anthropic API and spends money. Excluded from the default run — opt in explicitly with `pytest -m costly`.
addopts = -m "not costly"
